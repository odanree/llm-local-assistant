name: 🏛️ Quality Gate Check

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: ⚡ Verify Quality Gate
        # Quality gate check: Verify METRICS.json declares acceptable coverage
        # No coverage runs, no metric generation - just validation
        run: sh .github/skills/metrics-validator/validate-metrics.sh

      - name: 🏛️ Enforce Root Directory Rules
        run: sh .github/skills/root-enforcer/enforce.sh